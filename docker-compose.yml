version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: thien-nam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thien_nam_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thien-nam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Prisma Studio
  prisma-studio:
    image: node:20-alpine
    container_name: thien-nam-studio
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm install -g prisma && npx prisma studio --port 5555"
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - studio

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: thien-nam-network
